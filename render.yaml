databases:
  - name: playto-db
    plan: free
    databaseName: playto
    user: playto

services:
  - type: web
    name: playto-api
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn playto.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: playto.settings
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: RENDER
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: playto-redis
          type: redis
          property: connectionString

  - type: worker
    name: playto-worker
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A playto worker --loglevel=info --beat"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: playto.settings
      - key: RENDER
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: playto-redis
          type: redis
          property: connectionString

  - type: redis
    name: playto-redis
    plan: free
    maxmemoryPolicy: noeviction